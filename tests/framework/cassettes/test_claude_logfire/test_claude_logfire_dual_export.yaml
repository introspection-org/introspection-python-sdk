version: 1
events:
- kind: write
  data: '{"type": "control_request", "request_id": "req_REDACTED", "request": {"subtype":
    "initialize", "hooks": null}}

    '
- kind: read
  data:
    type: control_response
    response:
      subtype: success
      request_id: <redacted>
      response:
        commands:
        - name: update-config
          description: 'Use this skill to configure the Claude Code harness via settings.json.
            Automated behaviors ("from now on when X", "each time X", "whenever X",
            "before/after X") require hooks configured in settings.json - the harness
            executes these, not Claude, so memory/preferences cannot fulfill them.
            Also use for: permissions ("allow X", "add permission", "move permission
            to"), env vars ("set X=Y"), hook troubleshooting, or any changes to settings.json/settings.local.json
            files. Examples: "allow npm commands", "add bq permission to global settings",
            "move permission to user settings", "set DEBUG=true", "when claude stops
            show X". For simple settings like theme/model, suggest the /config command.'
          argumentHint: ''
        - name: verify
          description: Verify that a code change actually does what it's supposed
            to by running the app and observing behavior. Use when asked to verify
            a PR, confirm a fix works, test a change manually, check that a feature
            works, or validate local changes before pushing.
          argumentHint: ''
        - name: debug
          description: Enable debug logging for this session and help diagnose issues
          argumentHint: '[issue description]'
        - name: code-review
          description: "Review the current diff for correctness bugs at the given\
            \ effort level (low/medium: fewer, high-confidence findings; high\u2192\
            max: broader coverage, may include uncertain findings). Pass --comment\
            \ to post findings as inline PR comments."
          argumentHint: '[low|medium|high|xhigh|max] [--comment] [<target>]'
          aliases:
          - simplify
        - name: batch
          description: "Research and plan a large-scale change, then execute it in\
            \ parallel across 5\u201330 isolated worktree agents that each open a\
            \ PR."
          argumentHint: <instruction>
        - name: fewer-permission-prompts
          description: Scan your transcripts for common read-only Bash and MCP tool
            calls, then add a prioritized allowlist to project .claude/settings.json
            to reduce permission prompts.
          argumentHint: ''
        - name: loop
          description: Run a prompt or slash command on a recurring interval (e.g.
            /loop 5m /foo). Omit the interval to let the model self-pace.
          argumentHint: '[interval] [prompt]'
          aliases:
          - proactive
        - name: claude-api
          description: "Build, debug, and optimize Claude API / Anthropic SDK apps.\
            \ Apps built with this skill should include prompt caching. Also handles\
            \ migrating existing Claude API code between Claude model versions (4.5\
            \ \u2192 4.6, 4.6 \u2192 4.7, retired-model replacements).\nTRIGGER when:\
            \ code imports `anthropic`/`@anthropic-ai/sdk`; user asks for the Claude\
            \ API, Anthropic SDK, or Managed Agents; user adds/modifies/tunes a Claude\
            \ feature (caching, thinking, compaction, tool use, batch, files, citations,\
            \ memory) or model (Opus/Sonnet/Haiku) in a file; questions about prompt\
            \ caching / cache hit rate in an Anthropic SDK project.\nSKIP: file imports\
            \ `openai`/other-provider SDK, filename like `*-openai.py`/`*-generic.py`,\
            \ provider-neutral code, general programming/ML."
          argumentHint: ''
        - name: run
          description: Launch and drive this project's app to see a change working.
            Use when asked to run, start, or screenshot the app, or to confirm a change
            works in the real app (not just tests). First looks for a project skill
            that already covers launching the app; otherwise falls back to built-in
            patterns per project type (CLI, server, TUI, Electron, browser-driven,
            library).
          argumentHint: ''
        - name: run-skill-generator
          description: "Author or improve the run-<unit> skill \u2014 a per-project\
            \ skill that tells agents how to build, launch, and drive this project's\
            \ app. Use when the user asks to set up the project, get it running, write\
            \ run instructions, or verify build/run steps work from a clean environment."
          argumentHint: ''
        - name: clear
          description: Start a new session with empty context; previous session stays
            on disk (resumable with /resume)
          argumentHint: '[name]'
          aliases:
          - reset
          - new
        - name: compact
          description: Free up context by summarizing the conversation so far
          argumentHint: <optional custom summarization instructions>
        - name: context
          description: Show current context usage
          argumentHint: ''
        - name: heapdump
          description: Dump the JS heap to ~/Desktop
          argumentHint: ''
        - name: init
          description: Initialize a new CLAUDE.md file with codebase documentation
          argumentHint: ''
        - name: review
          description: Review a pull request
          argumentHint: ''
        - name: security-review
          description: Complete a security review of the pending changes on the current
            branch
          argumentHint: ''
        - name: usage
          description: Show the total cost and duration of the current session
          argumentHint: ''
          aliases:
          - cost
          - stats
        - name: insights
          description: Generate a report analyzing your Claude Code sessions
          argumentHint: ''
        - name: goal
          description: "Set a goal \u2014 keep working until the condition is met"
          argumentHint: ''
        - name: team-onboarding
          description: Help teammates ramp on Claude Code with a guide from your usage
          argumentHint: ''
        agents:
        - name: claude
          description: Catch-all for any task that doesn't fit a more specific agent.
            FleetView's default when no agent name is typed.
        - name: Explore
          description: "Fast read-only search agent for locating code. Use it to find\
            \ files by pattern (eg. \"src/components/**/*.tsx\"), grep for symbols\
            \ or keywords (eg. \"API endpoints\"), or answer \"where is X defined\
            \ / which files reference Y.\" Do NOT use it for code review, design-doc\
            \ auditing, cross-file consistency checks, or open-ended analysis \u2014\
            \ it reads excerpts rather than whole files and will miss content past\
            \ its read window. When calling, specify search breadth: \"quick\" for\
            \ a single targeted lookup, \"medium\" for moderate exploration, or \"\
            very thorough\" to search across multiple locations and naming conventions."
          model: haiku
        - name: general-purpose
          description: General-purpose agent for researching complex questions, searching
            for code, and executing multi-step tasks. When you are searching for a
            keyword or file and are not confident that you will find the right match
            in the first few tries use this agent to perform the search for you.
        - name: Plan
          description: Software architect agent for designing implementation plans.
            Use this when you need to plan the implementation strategy for a task.
            Returns step-by-step plans, identifies critical files, and considers architectural
            trade-offs.
        - name: statusline-setup
          description: Use this agent to configure the user's Claude Code status line
            setting.
          model: sonnet
        output_style: default
        available_output_styles:
        - default
        - Proactive
        - Explanatory
        - Learning
        models:
        - value: default
          displayName: Default (recommended)
          description: "Sonnet 4.6 \xB7 Best for everyday tasks"
          supportsEffort: true
          supportedEffortLevels:
          - low
          - medium
          - high
          - max
          supportsAdaptiveThinking: true
          supportsAutoMode: true
        - value: sonnet[1m]
          displayName: Sonnet (1M context)
          description: "Sonnet 4.6 with 1M context \xB7 Draws from usage credits \xB7\
            \ $3/$15 per Mtok"
          supportsEffort: true
          supportedEffortLevels:
          - low
          - medium
          - high
          - max
          supportsAdaptiveThinking: true
          supportsAutoMode: true
        - value: opus
          displayName: Opus
          description: "Opus 4.7 \xB7 Most capable for complex work"
          supportsEffort: true
          supportedEffortLevels:
          - low
          - medium
          - high
          - xhigh
          - max
          supportsAdaptiveThinking: true
          supportsFastMode: true
          supportsAutoMode: true
        - value: haiku
          displayName: Haiku
          description: "Haiku 4.5 \xB7 Fastest for quick answers"
        account:
          tokenSource: CLAUDE_CODE_OAUTH_TOKEN_FILE_DESCRIPTOR
          apiKeySource: ANTHROPIC_API_KEY
          apiProvider: firstParty
        pid: 11971
