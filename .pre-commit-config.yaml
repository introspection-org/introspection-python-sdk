# =============================================================================
# prek — Git hooks for Introspection Python SDK (Rust-based, no Python required)
# =============================================================================
# Install: brew install j178/tap/prek && prek install
# Run manually: prek run --all-files
# =============================================================================

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty type checker
        entry: uvx ty check
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

      # Enforces the coverage ratchet defined in [tool.coverage.report].
      # Runs on the manual stage by default (`prek run --hook-stage manual coverage`)
      # so it doesn't block fast iteration; CI runs the same check on every PR.
      # Run before pushing with: prek run --hook-stage manual coverage
      - id: coverage
        name: pytest coverage ratchet
        entry: uv run pytest tests/ --cov=introspection_sdk --cov-report=term --cov-fail-under=60 -q
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
        stages: [manual, pre-push]
