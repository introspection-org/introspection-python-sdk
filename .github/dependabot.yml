version: 2

updates:
  # ── Python dependencies (pyproject.toml + uv.lock) ──
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # Restrict alerts/PRs to deps that actually ship to SDK consumers — main
    # `[project] dependencies` plus the user-facing `[project.optional-dependencies]`
    # extras (langfuse / arize / braintrust / openai-agents). Excludes the
    # `test` and `dev` extras, which are CI-only and not part of the published
    # surface area.
    allow:
      - dependency-type: "production"
    groups:
      # OpenTelemetry runtime + exporter deps move as a fleet.
      otel:
        applies-to: version-updates
        patterns:
          - "opentelemetry-*"
      otel-security:
        applies-to: security-updates
        patterns:
          - "opentelemetry-*"

      # AI provider SDKs — Anthropic, OpenAI, OpenAI agents, etc.
      ai-providers:
        applies-to: version-updates
        patterns:
          - "openai"
          - "openai-agents"
          - "anthropic"
          - "claude-agent-sdk"
          - "pydantic-ai"
      ai-providers-security:
        applies-to: security-updates
        patterns:
          - "openai"
          - "openai-agents"
          - "anthropic"
          - "claude-agent-sdk"
          - "pydantic-ai"

      # Test toolchain — pytest family + helpers.
      test-tooling:
        applies-to: version-updates
        patterns:
          - "pytest*"
          - "inline-snapshot"
          - "dirty-equals"
          - "responses"
          - "pydantic"
      test-tooling-security:
        applies-to: security-updates
        patterns:
          - "pytest*"
          - "inline-snapshot"
          - "dirty-equals"
          - "responses"
          - "pydantic"

      # Lint / format / typecheck.
      lint-tooling:
        applies-to: version-updates
        patterns:
          - "ruff"
          - "ty"
          - "pre-commit"
      lint-tooling-security:
        applies-to: security-updates
        patterns:
          - "ruff"
          - "ty"
          - "pre-commit"

      # Observability backends used by the optional integrations.
      observability-vendors:
        applies-to: version-updates
        patterns:
          - "arize-phoenix"
          - "openinference-*"
          - "langfuse"
          - "braintrust"
          - "posthog"
      observability-vendors-security:
        applies-to: security-updates
        patterns:
          - "arize-phoenix"
          - "openinference-*"
          - "langfuse"
          - "braintrust"
          - "posthog"

      # Catch-all for security alerts not matching a more specific group.
      security-rollup:
        applies-to: security-updates
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # ── GitHub Actions (used by ci.yml / publish.yml / release-tag.yml) ──
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(actions)"
