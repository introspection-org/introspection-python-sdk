name: Examples

# Examples burn LLM tokens, so they're NOT run on every push.
#
# Triggers:
#   - workflow_dispatch  → manual run from the Actions UI / `gh workflow run`
#   - push of a v* tag   → verify release-time before publish picks up

on:
  workflow_dispatch:
    inputs:
      run_examples:
        description: "Run the OTel examples"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

concurrency:
  group: examples-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-examples:
    name: Run examples
    runs-on: ubuntu-latest
    environment: build
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache uv dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-examples-${{ hashFiles('examples/pyproject.toml', 'examples/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-examples-

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run examples
        if: inputs.run_examples
        working-directory: examples
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INTROSPECTION_TOKEN: ${{ secrets.INTROSPECTION_TOKEN }}
          INTROSPECTION_BASE_URL: ${{ vars.INTROSPECTION_BASE_URL }}
          ARIZE_API_KEY: ${{ secrets.ARIZE_API_KEY }}
          ARIZE_SPACE_KEY: ${{ secrets.ARIZE_SPACE_KEY }}
          BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ vars.LANGFUSE_BASE_URL }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: ./introspection_examples/otel/run_all.sh
